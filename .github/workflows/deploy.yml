name: Build, Push & Deploy to EKS

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/hospital-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/hospital-frontend
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CLUSTER_NAME: hospital-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ─── Docker Login ───────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── Backend ─────────────────────────────────
      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest

      # ─── Frontend ────────────────────────────────
      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_URL=http://backend-service

      # ─── AWS EKS ─────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Substitute secrets in K8s manifests
        run: |
          sed -i "s/DOCKERHUB_USERNAME/${{ secrets.DOCKERHUB_USERNAME }}/g" k8s/backend.yaml
          sed -i "s/DOCKERHUB_USERNAME/${{ secrets.DOCKERHUB_USERNAME }}/g" k8s/frontend.yaml
          sed -i "s@SUPABASE_URL_PLACEHOLDER@${{ secrets.SUPABASE_URL }}@g" k8s/backend.yaml
          sed -i "s/SUPABASE_USERNAME_PLACEHOLDER/${{ secrets.SUPABASE_USERNAME }}/g" k8s/backend.yaml
          # Password must be enclosed in single quotes or safely escaped, but for basic passwords standard sed is fine.
          sed -i "s/SUPABASE_PASSWORD_PLACEHOLDER/${{ secrets.SUPABASE_PASSWORD }}/g" k8s/backend.yaml

      - name: Deploy to EKS
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend-deployment --timeout=120s
          kubectl rollout status deployment/frontend-deployment --timeout=120s

      - name: Show services (get Load Balancer URLs)
        run: kubectl get svc
